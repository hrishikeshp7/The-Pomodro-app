name: Build And Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Release APK And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Compute version from git history
        id: version
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((1000 + COMMIT_COUNT))
          VERSION_NAME="1.0.${COMMIT_COUNT}"
          TAG="v${VERSION_NAME}"
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: |
          ./gradlew \
            assembleRelease \
            -PVERSION_CODE=${{ steps.version.outputs.version_code }} \
            -PVERSION_NAME=${{ steps.version.outputs.version_name }} \
            --stacktrace

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version_name }}
          allow_updates: true
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          fail_on_unmatched_files: true
